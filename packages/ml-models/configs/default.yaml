data_dir: data/processed/strokes
save_dir: models

seq_len: 30
input_size: 27  # 9 key joints × 3 coordinates (x, y, z)
model_dim: 192
hidden_size: 192
num_layers: 4
num_classes: 6
dropout: 0.25
num_heads: 6
max_seq_len: 120
temporal_kernels: [3, 5, 7]

batch_size: 32
lr: 0.0005
weight_decay: 0.01
epochs: 80
patience: 12
warmup_epochs: 4
min_lr_ratio: 0.05
grad_clip: 1.0
grad_accum_steps: 1

augment: true
noise_std: 0.01
temporal_mask_prob: 0.1
feature_dropout_prob: 0.02
mixup_alpha: 0.2
label_smoothing: 0.05
balanced_sampler: true
class_weights: true
amp: true
seed: 42
num_workers: 0

use_wandb: false
wandb_project: sportiq-stroke-classifier
